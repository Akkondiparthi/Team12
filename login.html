<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — IoT Smart Paper & Pulp Mill KPI Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(34,197,94,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34,197,94,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glowing orb */
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(34,197,94,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(34,197,94,0.06);
    }

    /* Green top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 20px; right: 20px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #22c55e, transparent);
      border-radius: 2px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .logo-text { line-height: 1.2; }
    .logo-text .title { font-size: 15px; font-weight: 700; color: #f1f5f9; }
    .logo-text .sub   { font-size: 11px; color: #64748b; margin-top: 2px; }

    h2 {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 28px;
    }

    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 7px;
      letter-spacing: 0.4px;
    }

    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      opacity: 0.5;
      pointer-events: none;
    }
    input[type=text], input[type=password] {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 11px 14px 11px 38px;
      color: #f1f5f9;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.12);
    }

    .toggle-pw {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 15px;
      color: #64748b;
      background: none;
      border: none;
      padding: 2px;
    }
    .toggle-pw:hover { color: #94a3b8; }

    .error-msg {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 12px;
      color: #fca5a5;
      margin-bottom: 16px;
    }
    .error-msg.show { display: block; }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }
    .btn-login:hover   { opacity: 0.9; }
    .btn-login:active  { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider {
      border: none;
      border-top: 1px solid #334155;
      margin: 24px 0 18px;
    }

    .hint-title {
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }
    .hint-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .hint-card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 9px 12px;
    }
    .hint-card .role {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .hint-card .role.admin  { color: #22c55e; }
    .hint-card .role.viewer { color: #3b82f6; }
    .hint-card .cred {
      font-size: 11px;
      color: #64748b;
      line-height: 1.6;
    }
    .hint-card .cred span { color: #94a3b8; font-weight: 600; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>
<body>

<div class="card">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">🏭</div>
    <div class="logo-text">
      <div class="title">IoT Smart Paper &amp; Pulp Mill</div>
      <div class="sub">KPI Dashboard · Team 12 · Hyderabad</div>
    </div>
  </div>

  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to access the KPI simulator</p>

  <div id="error-msg" class="error-msg">⚠ Incorrect username or password. Please try again.</div>

  <div class="field">
    <label for="username">Username</label>
    <div class="input-wrap">
      <span class="input-icon">👤</span>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />
    </div>
  </div>

  <div class="field">
    <label for="password">Password</label>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
      <button class="toggle-pw" onclick="togglePw()" title="Show/hide password" type="button">👁</button>
    </div>
  </div>

  <button class="btn-login" id="btn-login" onclick="doLogin()">Sign In</button>

</div>

<script>
  const USERS = {
    admin:  { password: "AKISB@78", role: "admin",  name: "Administrator" },
    viewer: { password: "ISBView@Team12",  role: "viewer", name: "Viewer" },
  };

  // Allow Enter key to submit
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });

  function togglePw() {
    const inp = document.getElementById("password");
    inp.type = inp.type === "password" ? "text" : "password";
  }

  function doLogin() {
    const username = document.getElementById("username").value.trim().toLowerCase();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("btn-login");
    const err      = document.getElementById("error-msg");

    err.classList.remove("show");

    const user = USERS[username];
    if (user && user.password === password) {
      // Store session
      sessionStorage.setItem("kpi_user",  username);
      sessionStorage.setItem("kpi_role",  user.role);
      sessionStorage.setItem("kpi_name",  user.name);

      // Show loading state
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Loading dashboard…';

      setTimeout(() => { window.location.href = "dashboard.html"; }, 600);
    } else {
      err.classList.add("show");
      document.getElementById("password").value = "";
      document.getElementById("password").focus();
    }
  }
</script>
</body>
</html>
